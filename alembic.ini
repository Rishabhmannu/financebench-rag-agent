# Sprint 9.0 — Alembic config for the rag-agent's own schema (currently
# just the `roles` table; will grow as features migrate from in-memory
# config dicts to DB-backed state).
#
# Migration scripts live in `migrations/versions/`. The DB URL is built
# at runtime from `src/config/settings.py` (see migrations/env.py) so
# this file doesn't carry credentials.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
