name: RAG Evaluation Gate

on:
  pull_request:
    paths:
      - "src/graph/**"
      - "src/config/prompts.py"
      - "tests/evaluation/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit/ -v

  evaluate:
    needs: test
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:v1.13.2
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[eval]"

      - name: Seed Qdrant with sample data
        run: python scripts/seed_qdrant.py --sample
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333

      - name: Run RAGAS evaluation
        run: python tests/evaluation/run_evaluation.py --output eval_results.json --check-thresholds
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333

      - name: Co-primary gate (SEC + FinanceBench baseline)
        run: python tests/evaluation/check_dual_thresholds.py --sec eval_results.json --financebench tests/evaluation/eval_results/financebench_baseline.json
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval_results.json
        if: always()
