services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - POSTGRES_HOST=postgres
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - rag-net

  frontend:
    build: .
    command: python -m src.frontend.gradio_app
    ports:
      - "7860:7860"
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - rag-net

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - rag-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_agent}
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag_user} -d ${POSTGRES_DB:-rag_agent}"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - rag-net

  # Sprint 8 8a — LiteLLM proxy as the single LLM gateway. Reads provider
  # API keys from .env (same file the api service uses) and exposes an
  # OpenAI-compatible endpoint at http://litellm:4000/v1. Sprint 8 8a Day 2
  # refactors src/services/llm_factory.py to drive all chat completions
  # through this proxy; Sprint 8 8b layers a Redis semantic cache on top
  # via LiteLLM's built-in cache plug-in (see redis service below).
  # Sprint 8 8c forwards every LLM trace to the langfuse-web UI.
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      # Sprint 8 8c — Langfuse trace forwarding. Project keys default to
      # the same values auto-init'd into langfuse-web below, so the proxy
      # boots ready to forward traces with no manual UI step. Override in
      # .env to use a different Langfuse project (see .env.example).
      - LANGFUSE_HOST=http://langfuse-web:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-pk-lf-aa6baaad5f2b2115993cb1932d831e09}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-sk-lf-e305bae5751200b21bc4f9cc5d644dca}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    depends_on:
      redis:
        condition: service_healthy
      langfuse-web:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - rag-net

  # Sprint 8 8b — Redis Stack (Redis + RediSearch + RedisJSON) backs the
  # LiteLLM semantic cache. Plain redis:alpine would NOT work — semantic
  # cache requires the RediSearch vector-similarity module. Single-tenant
  # local dev: no auth, no persistence beyond the named volume, no cluster.
  #
  # Host-side port is 6380, NOT 6379 — Sprint 8e diagnostic surfaced that
  # macOS users often have a brew/launchd Redis already on 6379 and the
  # host loopback wins the race against Docker's wildcard bind, silently
  # routing host-side cache traffic (e.g. the eval runner's 8e result
  # cache) to the wrong Redis. Inside the compose network LiteLLM still
  # talks to `redis:6379` via service-name DNS — only the host-mapped
  # port changes.
  redis:
    image: redis/redis-stack-server:7.2.0-v11
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - rag-net

  # ─── Sprint 8 8c: self-hosted Langfuse v3 observability stack ───────────
  # Six services (langfuse-postgres, langfuse-redis, langfuse-clickhouse,
  # langfuse-minio, langfuse-worker, langfuse-web). They share one network
  # with our main stack so LiteLLM can post traces directly. Host ports are
  # picked to avoid conflicts with our own postgres (5432) and redis (6379).
  #
  # Every secret below is DEV-ONLY default — sourced via `${VAR:-default}`
  # so a fresh `docker compose up` boots a working stack without manual
  # configuration. For ANY shared / multi-user / production deployment,
  # override every LANGFUSE_* var in .env (see .env.example). The defaults
  # only protect the local-machine Langfuse instance; rotating them is the
  # caller's responsibility before any shared deployment.

  langfuse-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_PG_PASSWORD:-langfusepw}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rag-net

  # Langfuse needs its own Redis (password-protected, used as a queue
  # backend). Cannot share with the LiteLLM semantic-cache redis because
  # (a) Langfuse requires AUTH (b) it uses a different eviction policy.
  langfuse-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      --requirepass ${LANGFUSE_REDIS_PASSWORD:-langfuseredispw}
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rag-net

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.10
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhousepw}
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - rag-net

  langfuse-minio:
    image: minio/minio:latest
    restart: unless-stopped
    entrypoint: sh
    # Pre-create the langfuse bucket so the worker doesn't need to.
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_MINIO_USER:-minio}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_MINIO_PASSWORD:-miniosecret}
    ports:
      # Expose console on 9091 for debugging; API stays cluster-internal.
      - "127.0.0.1:9091:9001"
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rag-net

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: unless-stopped
    depends_on: &langfuse-depends
      langfuse-postgres:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
    environment: &langfuse-shared-env
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_PG_PASSWORD:-langfusepw}@langfuse-postgres:5432/langfuse
      SALT: ${LANGFUSE_SALT:-dev-salt-5d08d0637206398f}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-65876cac67efd660b70ad7917a1ae854f60e8b11e3203010f18b95ad21a219a5}
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhousepw}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_PASSWORD:-miniosecret}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_USER:-minio}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_PASSWORD:-miniosecret}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      REDIS_AUTH: ${LANGFUSE_REDIS_PASSWORD:-langfuseredispw}
    networks:
      - rag-net

  langfuse-web:
    image: langfuse/langfuse:3
    restart: unless-stopped
    depends_on: *langfuse-depends
    ports:
      - "3000:3000"
    environment:
      <<: *langfuse-shared-env
      # HOSTNAME=0.0.0.0 forces Next.js to bind on all interfaces.
      # Without it the image binds only to its container IP, which makes
      # the in-container healthcheck against 127.0.0.1:3000 fail even
      # though the service is reachable on the bridge network.
      HOSTNAME: 0.0.0.0
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-dev-nextauth-e2b436ce32501a0903513b54236295b8}
      # Auto-bootstrap: on first boot, Langfuse seeds an org + project +
      # user with the keys/email/password below. Subsequent boots skip
      # the init (Langfuse stores this in postgres). The project keys
      # match what we hand to LiteLLM via env vars above, so traces
      # land in the seeded project automatically.
      LANGFUSE_INIT_ORG_ID: rag-agent-dev
      LANGFUSE_INIT_ORG_NAME: RAG Agent Dev
      LANGFUSE_INIT_PROJECT_ID: rag-agent
      LANGFUSE_INIT_PROJECT_NAME: rag-agent
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-aa6baaad5f2b2115993cb1932d831e09}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-e305bae5751200b21bc4f9cc5d644dca}
      LANGFUSE_INIT_USER_EMAIL: dev@local.test
      LANGFUSE_INIT_USER_NAME: Dev User
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-devpassword12}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/public/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - rag-net

volumes:
  qdrant_data:
  pg_data:
  redis_data:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_minio_data:

networks:
  rag-net:
    driver: bridge
